<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>LiftLog</title>
<meta name="theme-color" content="#0d1324">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LiftLog">
<meta name="application-name" content="LiftLog">
<link rel="icon" type="image/png" href="liftlog-icon.png">
<link rel="apple-touch-icon" href="liftlog-icon.png">
<style>
:root{--bg:#0d1324;--card:#172033;--card2:#101827;--line:#2a3955;--text:#f1f5ff;--muted:#a8b4cc;--accent:#8bd450;--accent2:#ffb86b;--blue:#72b7ff;--danger:#ff6b6b;--ok:#8bd450;--warn:#ffd166;--shadow:0 12px 32px rgba(0,0,0,.28)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0b1020,#111827 38%,#0f172a);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;color:var(--text)}
header{position:sticky;top:0;z-index:20;background:rgba(13,19,36,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:12px 14px}h1{font-size:18px;margin:0 0 9px;letter-spacing:.02em}.tabs{display:flex;gap:8px;overflow:auto}.tab{border:1px solid var(--line);background:#101827;color:var(--muted);border-radius:999px;padding:9px 13px;font-weight:800;white-space:nowrap}.tab.active{background:var(--accent);color:#102000;border-color:var(--accent)}
main{padding:14px;max-width:1050px;margin:auto}.view{display:none}.view.active{display:block}.card{background:rgba(23,32,51,.95);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}h2{font-size:16px;margin:0 0 12px}.subhead{font-size:13px;color:var(--muted);margin-top:-6px;margin-bottom:10px}label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}input,select,textarea{width:100%;background:#0b1220;border:1px solid var(--line);border-radius:12px;color:var(--text);padding:12px;font-size:16px}textarea{min-height:82px;resize:vertical}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:13px;padding:12px 14px;font-weight:900;font-size:15px;color:#102000;background:var(--accent);box-shadow:0 4px 12px rgba(139,212,80,.18)}.btn.secondary{background:#22304a;color:var(--text);border:1px solid var(--line)}.btn.warn{background:var(--accent2);color:#251100}.btn.danger{background:var(--danger);color:#270000}.btn.blue{background:var(--blue);color:#071322}.btn.small{padding:8px 10px;font-size:13px}.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);box-shadow:none}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.quick .btn{padding:10px 6px}.muted{color:var(--muted);font-size:13px}.tiny{font-size:12px;color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;padding:6px 9px;background:#0b1220;font-size:12px;color:var(--muted);margin:2px}.pill.ok{color:#153100;background:var(--ok);border-color:var(--ok);font-weight:800}.pill.warn{color:#271700;background:var(--warn);border-color:var(--warn);font-weight:800}.pill.bad{color:#270000;background:var(--danger);border-color:var(--danger);font-weight:800}.big{font-size:30px;font-weight:950}.result{background:#0b1220;border:1px solid var(--line);border-radius:16px;padding:12px}.notice{border-left:4px solid var(--accent2);padding:10px;background:#1b2438;border-radius:10px;color:#e9eefb}.setItem,.historyItem{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid var(--line);background:#0b1220;border-radius:14px;padding:10px;margin-top:8px}.setMain{font-weight:850}.oktxt{color:var(--accent)}.badtxt{color:var(--danger)}.warntxt{color:var(--warn)}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:14px}.rmTable{border-collapse:collapse;width:100%;min-width:620px;background:#fff;color:#000}.rmTable th,.rmTable td{border:1px solid #222;text-align:center;padding:7px 9px}.rmTable th{background:#8bd450}.rmTable .left{background:#ffb27a;font-weight:800;position:sticky;left:0}.footerBtns{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(15,23,42,0),#0f172a 22%);padding-top:18px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.dow{text-align:center;font-size:12px;color:var(--muted);font-weight:800}.day{min-height:76px;background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:7px;cursor:pointer}.day.off{opacity:.35}.day.today{border-color:var(--accent);box-shadow:0 0 0 1px rgba(139,212,80,.4) inset}.dayNum{font-weight:900;font-size:13px}.marks{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}.mark{font-size:10px;padding:3px 5px;border-radius:999px;background:#22304a;color:#eaf0ff}.mark.pr{background:var(--accent);color:#102000}.statGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:#0b1220;border:1px solid var(--line);border-radius:14px;padding:10px}.stat b{font-size:18px}.copyBox{white-space:pre-wrap;background:#0b1220;border:1px dashed var(--line);border-radius:14px;padding:12px;max-height:260px;overflow:auto}.switchLine{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);background:#0b1220;border-radius:14px;padding:10px;margin-top:8px}.linklike{color:var(--blue);text-decoration:underline;cursor:pointer}@media(max-width:650px){main{padding:10px}.grid,.grid3,.grid4,.statGrid{grid-template-columns:1fr}.quick{grid-template-columns:repeat(2,1fr)}.card{border-radius:15px;padding:12px}header{padding:10px}.tab{padding:8px 10px;font-size:13px}.big{font-size:25px}.day{min-height:62px;padding:5px}.mark{font-size:9px;padding:2px 4px}}
</style>
</head>
<body>
<header><h1>LiftLog</h1><div class="tabs"><button class="tab active" data-tab="log">今日</button><button class="tab" data-tab="calendar">カレンダー</button><button class="tab" data-tab="rm">RM換算</button><button class="tab" data-tab="history">履歴</button><button class="tab" data-tab="settings">設定</button></div></header>
<main>
<section id="log" class="view active">
 <div class="card"><h2>1. 今日の種目</h2><div class="grid3"><div><label>日付</label><input id="date" type="date"></div><div><label>主部位</label><select id="part"><option>胸</option><option>背中</option><option>脚</option><option>肩</option><option>二頭筋</option><option>三頭筋</option><option>腹筋</option><option>その他</option></select></div><div><label>目的</label><select id="goal"><option>筋肥大</option><option>筋力向上</option><option>フォーム練習</option><option>疲労管理</option></select></div></div><label style="margin-top:10px">種目</label><input id="exercise" list="exerciseList" placeholder="例：ベンチプレス / プレスダウン"><datalist id="exerciseList"></datalist><div id="lastBox" class="notice" style="margin-top:12px">種目を入力すると前回記録を表示します。</div><div id="recoveryBox" class="result" style="margin-top:12px"></div></div>
 <div class="card"><h2>2. セット入力</h2><div class="grid3"><div><label>重量 kg</label><input id="weight" type="number" step="0.1" inputmode="decimal" placeholder="100"></div><div><label>回数</label><input id="reps" type="number" step="1" inputmode="numeric" placeholder="5"></div><div><label>RPE</label><select id="rpe"><option>10</option><option>9.5</option><option>9</option><option>8.5</option><option selected>8</option><option>7</option></select></div></div><div style="margin-top:10px" class="quick"><button class="btn secondary" onclick="adjust('weight',-2.5)">重量 -2.5</button><button class="btn secondary" onclick="adjust('weight',2.5)">重量 +2.5</button><button class="btn secondary" onclick="adjust('reps',-1)">回数 -1</button><button class="btn secondary" onclick="adjust('reps',1)">回数 +1</button></div><div style="margin-top:10px" class="row"><button class="btn" onclick="addSet()">セット追加</button><button class="btn warn" onclick="copyLastSet()">前セットコピー</button><button class="btn secondary" onclick="clearCurrentSets()">今日のセットをクリア</button></div><div id="sets"></div></div>
 <div class="card"><h2>3. 予測・AI相談</h2><div class="grid"><div><label>予測モード</label><select id="predictionMode"><option value="off">OFF：記録だけ</option><option value="standard" selected>標準：推定MAX・次セット目安</option><option value="detail">詳細：疲労/部位間隔も反映</option></select></div><div><label>AI出力モード</label><select id="aiMode"><option value="simple" selected>簡易</option><option value="detail">詳細</option><option value="off">OFF</option></select></div></div><div id="predictionBox" class="result" style="margin-top:12px">セット追加後に予測を表示します。</div><div style="margin-top:10px" class="row"><button class="btn blue" onclick="copyAI('next')">次セット相談をコピー</button><button class="btn blue" onclick="copyAI('exercise')">この種目まとめをコピー</button><button class="btn secondary" onclick="copyAI('day')">今日全体をコピー</button></div><div id="copyStatus" class="tiny" style="margin-top:8px"></div><div id="aiPreview" class="copyBox" style="margin-top:10px;display:none"></div></div>
 <div class="card"><h2>4. 体調・メモ</h2><div class="grid3"><div><label>筋肉痛/違和感</label><select id="condition"><option>問題なし</option><option>筋肉痛あり</option><option>関節違和感あり</option><option>疲労強い</option></select></div><div><label>体重 kg 任意</label><input id="bodyweight" type="number" step="0.1" inputmode="decimal"></div><div><label>インターバル目安</label><select id="restMin"><option>1〜2分</option><option selected>2〜3分</option><option>3〜5分</option><option>5分以上</option></select></div></div><label style="margin-top:10px">メモ</label><textarea id="memo" placeholder="例：フォームOK、肘に違和感、パンプ強い、今日は寝不足"></textarea></div>
 <div class="footerBtns"><button class="btn" style="width:100%" onclick="saveWorkout()">今日の記録を保存</button></div>
</section>

<section id="calendar" class="view"><div class="card"><div class="row" style="justify-content:space-between"><button class="btn secondary" onclick="moveMonth(-1)">前月</button><h2 id="calTitle" style="margin:0"></h2><button class="btn secondary" onclick="moveMonth(1)">次月</button></div><div class="calendar" id="calendarGrid" style="margin-top:12px"></div></div><div class="card"><h2>選択日の記録</h2><div id="dayDetail" class="muted">カレンダーの日付をタップしてください。</div></div></section>

<section id="rm" class="view"><div class="card"><h2>RM換算・何kg扱えるか</h2><p class="subhead">推定1RM = 重量 × (1 + 回数 ÷ 40)。RPE込みでは「回数 + RIR」で計算します。</p><div class="grid4"><div><label>扱った重量 kg</label><input id="rmWeight" type="number" step="0.1" inputmode="decimal" value="100"></div><div><label>できた回数</label><select id="rmReps"><option>2</option><option>3</option><option>4</option><option selected>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div><div><label>RPE</label><select id="rmRpe"><option>10</option><option>9.5</option><option>9</option><option>8.5</option><option selected>8</option><option>7</option></select></div><div><label>目標回数</label><select id="targetReps"><option>2</option><option>3</option><option>4</option><option selected>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select></div></div><button class="btn" style="margin-top:10px;width:100%" onclick="calcRM()">計算</button><div id="rmResult" class="result" style="margin-top:12px"></div></div><div class="card"><h2>RM換算表</h2><div class="tableWrap"><table class="rmTable" id="rmTable"></table></div></div></section>

<section id="history" class="view"><div class="card"><h2>履歴・検索</h2><div class="grid3"><div><label>部位で絞り込み</label><select id="filterPart"><option value="">すべて</option><option>胸</option><option>背中</option><option>脚</option><option>肩</option><option>二頭筋</option><option>三頭筋</option><option>腹筋</option><option>その他</option></select></div><div><label>種目名で検索</label><input id="filterExercise" placeholder="例：ベンチ"></div><div><label>表示</label><button class="btn secondary" onclick="renderHistory()">更新</button></div></div><div id="historyStats" class="statGrid" style="margin-top:12px"></div><div id="historyList"></div></div></section>

<section id="settings" class="view"><div class="card"><h2>登録種目</h2><p class="subhead">よく使う種目を1行ずつ入力。入力候補に出ます。</p><textarea id="exerciseMaster"></textarea><button class="btn" style="margin-top:10px" onclick="saveExercises()">保存</button></div><div class="card"><h2>保存・バックアップ</h2><p class="subhead">この版はブラウザ内保存です。長期運用ではJSON出力を定期的に行ってください。</p><div class="row"><button class="btn secondary" onclick="exportData()">JSON出力</button><button class="btn secondary" onclick="document.getElementById('importFile').click()">JSON取込</button><button class="btn danger" onclick="clearAll()">全削除</button><input id="importFile" type="file" accept="application/json" style="display:none" onchange="importData(event)"></div><div id="storageInfo" class="result" style="margin-top:12px"></div></div></section>
</main>
<script>
const K='training_rm_ai_calendar_v2';
const oldK='training_rm_log_v1';
const defaultExercises=['ベンチプレス','インクラインベンチプレス','ダンベルプレス','チェストプレス','ラットプルダウン','ローイング','デッドリフト','スクワット','レッグプレス','レッグカール','レッグエクステンション','ショルダープレス','サイドレイズ','リアレイズ','アームカール','ハンマーカール','プレスダウン','オーバーヘッドエクステンション','クランチ','アブローラー'];
let data=loadData();let currentSets=[];let calDate=new Date();
function loadData(){let raw=localStorage.getItem(K); if(raw) return JSON.parse(raw); let old=localStorage.getItem(oldK); if(old){try{let d=JSON.parse(old); d.version=2; d.settings={}; d.workouts=(d.workouts||[]).map(migrateWorkout); return d}catch(e){}} return {version:2,workouts:[],exercises:defaultExercises,settings:{}}}
function migrateWorkout(w){return {id:w.id||Date.now()+Math.random(),dateISO:w.dateISO||jpToISO(w.date)||todayISO(),date:w.date||formatDateJP(w.dateISO||todayISO()),part:w.part||'その他',exercise:w.exercise||'',goal:w.goal||'筋肥大',sets:(w.sets||[]).map(s=>normalizeSet(s)),condition:w.condition||'問題なし',bodyweight:w.bodyweight||'',restMin:w.restMin||'',memo:w.memo||''}}
function save(){localStorage.setItem(K,JSON.stringify(data));renderStorageInfo()}
function $(id){return document.getElementById(id)}
function todayISO(){return new Date().toISOString().slice(0,10)}
function formatDateJP(iso){let d=new Date(iso+'T00:00:00');return d.toLocaleDateString('ja-JP')}
function jpToISO(s){if(!s)return ''; let m=String(s).match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/); if(m)return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`; return ''}
function daysBetween(a,b){let da=new Date(a+'T00:00:00'), db=new Date(b+'T00:00:00');return Math.round((da-db)/86400000)}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function rir(rpe){let map={10:0,9.5:.5,9:1,8.5:1.5,8:2,7:3};return map[Number(rpe)]??Math.max(0,10-Number(rpe))}
function est1RM(w,reps,rpe=10){let eff=Number(reps)+rir(rpe);return Number(w)*(1+eff/40)}
function raw1RM(w,reps){return Number(w)*(1+Number(reps)/40)}
function repsAtWeight(oneRM,w,targetRpe=10){let eff=40*(oneRM/Number(w)-1);return Math.max(0,eff-rir(targetRpe))}
function round1(n){return Math.round(Number(n)*10)/10}
function roundTo2_5(n){return Math.max(0,Math.round(Number(n)/2.5)*2.5)}
function normalizeSet(s){let set={weight:Number(s.weight),reps:Number(s.reps),rpe:Number(s.rpe??10)};set.raw1rm=round1(raw1RM(set.weight,set.reps));set.est1rm=round1(est1RM(set.weight,set.reps,set.rpe));return set}
function bestSet(sets){return sets.reduce((a,b)=>b.est1rm>a.est1rm?b:a,sets[0])}
function volume(sets){return sets.reduce((sum,s)=>sum+s.weight*s.reps,0)}
function init(){ $('date').value=todayISO(); renderDatalist(); $('exerciseMaster').value=data.exercises.join('\n'); $('exercise').addEventListener('input',()=>{showLast();renderRecovery();updatePrediction()}); ['part','date','condition','predictionMode','aiMode','goal','restMin','memo'].forEach(id=>$(id).addEventListener('input',()=>{renderRecovery();updatePrediction()})); ['filterPart','filterExercise'].forEach(id=>$(id).addEventListener('input',renderHistory)); document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b)); calcRM(); buildTable(); renderRecovery(); renderStorageInfo(); }
function switchTab(b){document.querySelectorAll('.tab,.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.tab).classList.add('active'); if(b.dataset.tab==='history')renderHistory(); if(b.dataset.tab==='calendar')renderCalendar(); if(b.dataset.tab==='rm'){calcRM();buildTable()} if(b.dataset.tab==='settings')renderStorageInfo()}
function renderDatalist(){ $('exerciseList').innerHTML=data.exercises.map(e=>`<option value="${escapeHtml(e)}">`).join('') }
function adjust(id,d){let el=$(id);let v=parseFloat(el.value||0)+d;if(id==='reps')v=Math.max(0,Math.round(v));el.value=(id==='weight'?Math.max(0,v).toFixed(1):v)}
function addSet(){let w=parseFloat($('weight').value), reps=parseInt($('reps').value), rpe=parseFloat($('rpe').value); if(!w||!reps)return alert('重量と回数を入力してください'); currentSets.push(normalizeSet({weight:w,reps,rpe})); renderSets(); updatePrediction(); showLast(); }
function copyLastSet(){if(!currentSets.length)return;let s=currentSets[currentSets.length-1];$('weight').value=s.weight;$('reps').value=s.reps;$('rpe').value=s.rpe}
function clearCurrentSets(){if(currentSets.length&&confirm('今日の未保存セットをクリアしますか？')){currentSets=[];renderSets();updatePrediction()}}
function delSet(i){currentSets.splice(i,1);renderSets();updatePrediction()}
function renderSets(){ $('sets').innerHTML=currentSets.map((s,i)=>`<div class="setItem"><div><div class="setMain">${i+1}セット目：${s.weight}kg × ${s.reps}回 RPE${s.rpe}</div><div class="muted">RPE込み推定1RM：${s.est1rm}kg / 通常RM：${s.raw1rm}kg</div></div><button class="btn danger small" onclick="delSet(${i})">削除</button></div>`).join('') }
function lastByExercise(ex,beforeISO){return [...data.workouts].filter(w=>w.exercise===ex && (!beforeISO||w.dateISO<beforeISO)).sort((a,b)=>b.dateISO.localeCompare(a.dateISO))[0]}
function lastByPart(part,beforeISO){return [...data.workouts].filter(w=>w.part===part && (!beforeISO||w.dateISO<beforeISO)).sort((a,b)=>b.dateISO.localeCompare(a.dateISO))[0]}
function showLast(){let ex=$('exercise').value.trim(), iso=$('date').value; if(!ex){$('lastBox').innerHTML='種目を入力すると前回記録を表示します。';return} let last=lastByExercise(ex,iso); if(!last){$('lastBox').innerHTML=`${escapeHtml(ex)} の前回記録はまだありません。`;return} let best=bestSet(last.sets); let gap=daysBetween(iso,last.dateISO); let target=best.rpe>=9.5?`${best.weight}kgで${best.reps+1}回以上、または+2.5kg候補`:`同重量で回数更新、または+2.5kg候補`; $('lastBox').innerHTML=`<b>前回 ${last.date}（${gap}日前）</b><br>${last.sets.map((s,i)=>`${i+1}: ${s.weight}kg×${s.reps}回 RPE${s.rpe}`).join(' / ')}<br>前回最高推定1RM：<b>${best.est1rm}kg</b><br><span class="oktxt">次回目標：${target}</span>`}
function partStatus(days){if(days===null)return {label:'記録なし',cls:'warn',score:0,desc:'初回または履歴なし'}; if(days<=1)return {label:`${days}日空き`,cls:'bad',score:-2,desc:'回復不足の可能性'}; if(days===2)return {label:'2日空き',cls:'warn',score:-1,desc:'注意。高RPE連発は控えめ'}; if(days<=5)return {label:`${days}日空き`,cls:'ok',score:1,desc:'標準的な間隔'}; return {label:`${days}日空き`,cls:'ok',score:2,desc:'十分空いている可能性'} }
function recoveryInfo(){let iso=$('date').value, part=$('part').value;let last=lastByPart(part,iso);let days=last?daysBetween(iso,last.dateISO):null;let st=partStatus(days);return {last,days,...st}}
function renderRecovery(){let info=recoveryInfo();let part=$('part').value;let body=`<div><b>${escapeHtml(part)}</b>：<span class="pill ${info.cls}">${info.label}</span> ${info.desc}</div>`;let parts=['胸','背中','脚','肩','二頭筋','三頭筋','腹筋'];let pills=parts.map(p=>{let last=lastByPart(p,$('date').value), d=last?daysBetween($('date').value,last.dateISO):null, st=partStatus(d);return `<span class="pill ${st.cls}">${p}:${st.label}</span>`}).join('');$('recoveryBox').innerHTML=body+`<div style="margin-top:8px">${pills}</div>`}
function fatigueRate(){let mode=$('predictionMode').value; if(mode==='off')return 0; let last=currentSets[currentSets.length-1]; if(!last)return 0; let base=.025 + Math.max(0,currentSets.length-1)*.012; if(last.rpe>=10)base+=.025; else if(last.rpe>=9)base+=.015; else if(last.rpe<=8)base-=.005; if(mode==='detail'){let r=recoveryInfo(); if(r.score<0)base+=.015; if(r.score>1)base-=.005; let c=$('condition').value; if(c==='疲労強い'||c==='関節違和感あり')base+=.02; if(c==='筋肉痛あり')base+=.012;} return Math.min(.12,Math.max(.01,base))}
function prediction(){if(!currentSets.length||$('predictionMode').value==='off')return null;let best=bestSet(currentSets), last=currentSets[currentSets.length-1];let f=fatigueRate();let effective=best.est1rm*(1-f);let sameReps=Math.floor(repsAtWeight(effective,last.weight,9.5));let standardW=roundTo2_5(last.weight*(1-f));let standardR=Math.max(1,Math.floor(repsAtWeight(effective,standardW,9.5)));let safeW=roundTo2_5(last.weight*(1-f-.025));let safeR=Math.max(1,Math.floor(repsAtWeight(effective,safeW,9.5)));let attackR=Math.max(1,Math.floor(repsAtWeight(effective,last.weight,10)));let rec=recoveryInfo();let recommendation='標準';if(last.rpe>=10||$('condition').value==='関節違和感あり'||rec.score<0)recommendation='安全';else if(last.rpe<=8&&rec.score>=1&&currentSets.length===1)recommendation='攻める余地あり';return {best,last,f,effective,sameReps,standardW,standardR,safeW,safeR,attackR,rec,recommendation}}
function updatePrediction(){let p=prediction(); if(!currentSets.length){$('predictionBox').innerHTML='セット追加後に予測を表示します。';return} if($('predictionMode').value==='off'){$('predictionBox').innerHTML='予測モードOFF：記録のみ表示します。';return} let total=round1(volume(currentSets)); let html=`<div class="grid3"><div class="stat"><span class="muted">今日の最高推定1RM</span><br><b>${p.best.est1rm}kg</b></div><div class="stat"><span class="muted">総ボリューム</span><br><b>${total}kg</b></div><div class="stat"><span class="muted">推奨</span><br><b>${p.recommendation}</b></div></div>`; html+=`<div style="margin-top:12px"><b>次セット目安</b><br>攻める：${p.last.weight}kg × ${p.attackR}回前後<br>標準：${p.standardW}kg × ${p.standardR}回前後<br>安全：${p.safeW}kg × ${p.safeR}回前後</div>`; html+=`<div class="muted" style="margin-top:8px">疲労補正：約${Math.round(p.f*100)}%。${$('predictionMode').value==='detail'?'部位間隔・体調も反映。':'重量/回数/RPEを中心に算出。'} 予測は目安です。</div>`; $('predictionBox').innerHTML=html}
function saveWorkout(){let ex=$('exercise').value.trim(); if(!ex)return alert('種目を入力してください'); if(!currentSets.length)return alert('セットを追加してください'); let iso=$('date').value||todayISO(); let w={id:Date.now(),dateISO:iso,date:formatDateJP(iso),part:$('part').value,exercise:ex,goal:$('goal').value,sets:currentSets.map(normalizeSet),condition:$('condition').value,bodyweight:$('bodyweight').value,restMin:$('restMin').value,memo:$('memo').value}; data.workouts.push(w); if(!data.exercises.includes(ex))data.exercises.push(ex); save(); let b=bestSet(w.sets); alert(`保存しました\n今回の最高推定1RM：${b.est1rm}kg\n総ボリューム：${round1(volume(w.sets))}kg`); currentSets=[]; renderSets(); renderDatalist(); showLast(); renderRecovery(); updatePrediction(); renderCalendar(); }
function calcRM(){let w=parseFloat($('rmWeight').value||0), r=parseInt($('rmReps').value), rpe=parseFloat($('rmRpe').value), tr=parseInt($('targetReps').value); if(!w)return; let one=est1RM(w,r,rpe); let raw=raw1RM(w,r); let target=one/(1+(tr+rir(10))/40); let rows=[]; for(let i=2;i<=10;i++)rows.push(`<span class="pill">${i}回なら ${round1(one/(1+i/40))}kg</span>`); $('rmResult').innerHTML=`<div class="muted">RPE込み推定1RM</div><div class="big">${round1(one)} kg</div><div class="muted">通常RM換算：${round1(raw)}kg / ${r}回 RPE${rpe} → ${round1(r+rir(rpe))}回相当</div><div style="margin-top:8px">同じ強度換算で <b>${tr}回なら ${round1(target)}kg</b> 目安</div><div style="margin-top:8px">${rows.join('')}</div>`}
function buildTable(){let html='<tr><th class="left">重量</th>';for(let r=2;r<=10;r++)html+=`<th>${r}RM</th>`;html+='</tr>';for(let w=5;w<=200;w+=5){html+=`<tr><td class="left">${w}</td>`;for(let r=2;r<=10;r++)html+=`<td>${round1(raw1RM(w,r)).toFixed(1)}</td>`;html+='</tr>'}$('rmTable').innerHTML=html}
['rmWeight','rmReps','rmRpe','targetReps'].forEach(id=>$(id).addEventListener('input',calcRM));
function makeAI(type){if($('aiMode').value==='off')return 'AI出力モードがOFFです。';let ex=$('exercise').value.trim()||'未入力';let p=prediction();let lines=[];lines.push('以下は筋トレ中のリアルタイム記録です。');lines.push(`目的：${$('goal').value}`);lines.push(`日付：${$('date').value}`);lines.push(`部位：${$('part').value}`);lines.push(`種目：${ex}`);lines.push(`体調：${$('condition').value}`);lines.push(`インターバル：${$('restMin').value}`);let rec=recoveryInfo();lines.push(`部位間隔：${$('part').value}は${rec.label}（${rec.desc}）`);if(currentSets.length){lines.push('【今日のセット】');currentSets.forEach((s,i)=>lines.push(`${i+1}セット目：${s.weight}kg × ${s.reps}回 RPE${s.rpe}（推定1RM ${s.est1rm}kg）`));}
let last=lastByExercise(ex,$('date').value);if(last&&$('aiMode').value==='detail'){lines.push('【前回記録】');last.sets.forEach((s,i)=>lines.push(`${last.date} ${i+1}セット目：${s.weight}kg × ${s.reps}回 RPE${s.rpe}（推定1RM ${s.est1rm}kg）`));}
let memo=$('memo').value.trim(); if(memo)lines.push(`メモ：${memo}`); if(p){lines.push('【アプリ内予測】');lines.push(`今日の最高推定1RM：${p.best.est1rm}kg`);lines.push(`次セット目安：攻める ${p.last.weight}kg×${p.attackR}回 / 標準 ${p.standardW}kg×${p.standardR}回 / 安全 ${p.safeW}kg×${p.safeR}回`);lines.push(`アプリ推奨：${p.recommendation}`);} if(type==='next')lines.push('次セットの重量・回数・RPE目標を提案してください。攻めるべきか、維持か、下げるべきかも判断してください。');else if(type==='exercise')lines.push('この種目を続けるべきか、次の種目へ移るべきか、次セット設定も含めて提案してください。');else lines.push('今日の全体を見て、次回の重量設定・種目継続/変更・疲労リスクを判断してください。');return lines.join('\n')}
async function copyAI(type){let text=makeAI(type);$('aiPreview').style.display='block';$('aiPreview').textContent=text;try{await navigator.clipboard.writeText(text);$('copyStatus').textContent='コピーしました。ChatGPTに貼り付けできます。'}catch(e){$('copyStatus').textContent='コピーできない環境です。下の文章を手動でコピーしてください。'}}
function renderHistory(){let fp=$('filterPart')?.value||'', fe=($('filterExercise')?.value||'').trim();let arr=[...data.workouts].filter(w=>(!fp||w.part===fp)&&(!fe||w.exercise.includes(fe))).sort((a,b)=>b.dateISO.localeCompare(a.dateISO));let totalSets=arr.reduce((n,w)=>n+w.sets.length,0), totalVol=round1(arr.reduce((n,w)=>n+volume(w.sets),0));let best=arr.flatMap(w=>w.sets.map(s=>({...s,exercise:w.exercise,date:w.date}))).sort((a,b)=>b.est1rm-a.est1rm)[0];$('historyStats').innerHTML=`<div class="stat"><span class="muted">記録数</span><br><b>${arr.length}日</b></div><div class="stat"><span class="muted">セット数</span><br><b>${totalSets}</b></div><div class="stat"><span class="muted">総ボリューム</span><br><b>${totalVol}kg</b></div>`;let list=$('historyList'); if(!arr.length){list.innerHTML='<p class="muted">該当する履歴はありません。</p>';return}list.innerHTML=arr.map(w=>{let b=bestSet(w.sets);return `<div class="historyItem"><div><b>${w.date} ${escapeHtml(w.part)} / ${escapeHtml(w.exercise)}</b><div class="muted">${w.sets.map((s,i)=>`${i+1}: ${s.weight}kg×${s.reps} RPE${s.rpe}`).join(' / ')}</div><div class="muted">最高推定1RM ${b.est1rm}kg｜総量 ${round1(volume(w.sets))}kg｜${escapeHtml(w.condition)}｜${escapeHtml(w.memo||'')}</div></div><button class="btn danger small" onclick="deleteWorkout(${w.id})">削除</button></div>`}).join('')}
function deleteWorkout(id){if(confirm('この記録を削除しますか？')){data.workouts=data.workouts.filter(w=>w.id!==id);save();renderHistory();renderCalendar();renderRecovery();showLast();}}
function renderCalendar(){let y=calDate.getFullYear(), m=calDate.getMonth();$('calTitle').textContent=`${y}年${m+1}月`;let first=new Date(y,m,1), start=new Date(y,m,1-first.getDay());let html=['日','月','火','水','木','金','土'].map(d=>`<div class="dow">${d}</div>`).join('');for(let i=0;i<42;i++){let d=new Date(start);d.setDate(start.getDate()+i);let iso=d.toISOString().slice(0,10);let ws=data.workouts.filter(w=>w.dateISO===iso);let off=d.getMonth()!==m?' off':'';let today=iso===todayISO()?' today':'';let marks=ws.slice(0,4).map(w=>`<span class="mark ${bestSet(w.sets).est1rm>=previousBestBefore(w.exercise,iso)?'pr':''}">${escapeHtml(w.part[0])}</span>`).join('');html+=`<div class="day${off}${today}" onclick="showDay('${iso}')"><div class="dayNum">${d.getDate()}</div><div class="marks">${marks}</div></div>`}$('calendarGrid').innerHTML=html}
function previousBestBefore(ex,iso){let sets=data.workouts.filter(w=>w.exercise===ex&&w.dateISO<iso).flatMap(w=>w.sets);if(!sets.length)return Infinity;return Math.max(...sets.map(s=>s.est1rm))}
function moveMonth(n){calDate.setMonth(calDate.getMonth()+n);renderCalendar()}
function showDay(iso){let ws=data.workouts.filter(w=>w.dateISO===iso);if(!ws.length){$('dayDetail').innerHTML=`${formatDateJP(iso)} の記録はありません。`;return}$('dayDetail').innerHTML=`<b>${formatDateJP(iso)}</b>`+ws.map(w=>`<div class="historyItem"><div><b>${escapeHtml(w.part)} / ${escapeHtml(w.exercise)}</b><div class="muted">${w.sets.map((s,i)=>`${i+1}: ${s.weight}kg×${s.reps} RPE${s.rpe}`).join(' / ')}</div><div class="muted">最高推定1RM ${bestSet(w.sets).est1rm}kg｜${escapeHtml(w.condition)}｜${escapeHtml(w.memo||'')}</div></div></div>`).join('')}
function saveExercises(){data.exercises=$('exerciseMaster').value.split('\n').map(s=>s.trim()).filter(Boolean);save();renderDatalist();alert('保存しました')}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='training_rm_ai_calendar_backup.json';a.click()}
function importData(e){let f=e.target.files[0]; if(!f)return;let fr=new FileReader();fr.onload=()=>{try{let d=JSON.parse(fr.result);data={version:2,workouts:(d.workouts||[]).map(migrateWorkout),exercises:d.exercises&&d.exercises.length?d.exercises:defaultExercises,settings:d.settings||{}};save();location.reload()}catch(err){alert('JSONを読み込めません')}};fr.readAsText(f)}
function clearAll(){if(confirm('全データを削除しますか？この操作は戻せません。')){localStorage.removeItem(K);location.reload()}}
function renderStorageInfo(){let bytes=new Blob([JSON.stringify(data)]).size;let setCount=data.workouts.reduce((n,w)=>n+w.sets.length,0);$('storageInfo').innerHTML=`現在：${data.workouts.length}日 / ${setCount}セット / 約${Math.round(bytes/1024)}KB 保存中。<br>目安：テキスト記録のみなら数千〜数万セットまで扱える可能性がありますが、ブラウザ内保存なので週1回程度のJSON出力を推奨します。`}
init();
</script>
